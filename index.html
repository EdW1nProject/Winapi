<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINYUK | Nailong API Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Sniglet:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #fffdeb; /* Kuning Pastel Lembut Nailong */
            --primary: #ffd600; /* Kuning Terang Nailong */
            --secondary: #ff8c00; /* Oranye Nailong */
            --tiktok: #ff0050;
            --discord: #5865F2;
            --facebook: #1877F2;
            --text-main: #5d4037; /* Cokelat Tua Lembut */
            --text-muted: #8d6e63;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(255, 214, 0, 0.3);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Sniglet', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Animasi Nailong Full Layar (Background) --- */
        .nailong-bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Elemen Nailong Melompat di Background */
        .nailong-character {
            position: absolute;
            width: 80px; height: 80px;
            background-color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(255, 214, 0, 0.4);
            opacity: 0.7;
        }
        /* Ikon Nailong Sederhana (bisa diganti gambar asli) */
        .nailong-character::before { content: '🐉'; } 

        .nailong-1 { top: 10%; left: 10%; animation: nailongJump 6s ease-in-out infinite; }
        .nailong-2 { top: 60%; left: 80%; animation: nailongJump 8s ease-in-out infinite 1s; }
        .nailong-3 { top: 80%; left: 20%; animation: nailongJump 7s ease-in-out infinite 2s; }
        .nailong-4 { top: 30%; left: 70%; animation: nailongJump 9s ease-in-out infinite 3s; }

        @keyframes nailongJump {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-50px) rotate(20deg) scale(1.1); }
        }

        /* --- Header & Title --- */
        header { 
            text-align: center; 
            padding: 4rem 2rem 2rem; 
            animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0;
            transform: translateY(-40px);
        }
        
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 3px 3px 0px var(--secondary), 5px 5px 0px rgba(0,0,0,0.1);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-family: 'Sniglet', cursive;
            color: var(--secondary);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- Kontainer Utama Tema Ceria --- */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 650px;
            margin-bottom: 4rem;
        }

        .container {
            background: var(--card-bg);
            border: 4px solid var(--card-border);
            border-radius: 30px;
            padding: 2.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(255, 214, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi Sudut Nailong */
        .container::before {
            content: '🐉';
            position: absolute;
            top: -15px; right: -15px;
            font-size: 3rem;
            transform: rotate(15deg);
            opacity: 0.8;
        }

        /* --- Tab Navigasi --- */
        .tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            background: #fff;
            padding: 0.6rem;
            border-radius: 20px;
            border: 2px solid var(--card-border);
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 110px;
            padding: 0.9rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 1rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn:hover { background: #fff8e1; color: var(--primary); }

        .tab-btn.active[data-target="tiktok"] { 
            background: var(--tiktok); color: white; box-shadow: 0 5px 15px rgba(255, 0, 80, 0.3);
        }
        .tab-btn.active[data-target="discord"] { 
            background: var(--discord); color: white; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3);
        }
        .tab-btn.active[data-target="facebook"] { 
            background: var(--facebook); color: white; box-shadow: 0 5px 15px rgba(24, 119, 242, 0.3);
        }

        /* --- Input Bulat & Lucu --- */
        .input-group { position: relative; margin-bottom: 1.5rem; }
        
        input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: #fff;
            border: 3px solid #eee;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Sniglet', cursive;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(255, 214, 0, 0.3); 
        }

        /* --- Tombol Proses Nailong --- */
        .btn-process {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-family: 'Fredoka One', cursive;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 0px #e6b800, 0 10px 20px rgba(255, 140, 0, 0.3);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
        }

        .btn-process:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 0px #e6b800, 0 12px 25px rgba(255, 140, 0, 0.4); 
        }

        .btn-process:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px #e6b800, 0 5px 10px rgba(255, 140, 0, 0.2);
        }

        /* --- Area Hasil --- */
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 20px;
            background: #fff;
            border: 3px solid var(--card-border);
            display: none;
            word-break: break-word;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Custom Animasi Loading Nailong --- */
        .loader-wrapper {
            display: none;
            text-align: center;
            margin: 1rem auto;
        }
        .nailong-loader {
            font-size: 3rem;
            animation: nailongSpin 1.5s linear infinite;
            display: inline-block;
        }
        .loading-text {
            color: var(--secondary);
            font-weight: 800;
            margin-top: 0.5rem;
        }

        /* --- Media Grid --- */
        .media-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        
        .media-item {
            background: #fff8e1;
            padding: 1rem;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--card-border);
            transition: transform 0.3s ease;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .media-item:hover { transform: scale(1.05) rotate(2deg); border-color: var(--primary); }
        
        .media-item img, .media-item video {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 1rem;
            aspect-ratio: 9/16;
            object-fit: cover;
            background: #fff;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .btn-download {
            display: inline-block;
            width: 100%;
            padding: 0.7rem;
            background: var(--secondary);
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 4px 0px #cd6600;
        }
        
        .btn-download:hover { background: var(--primary); box-shadow: 0 4px 0px #e6b800; transform: translateY(-2px); }

        /* --- Keyframes Animasi --- */
        @keyframes slideDownFade { to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes nailongSpin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

    </style>
</head>
<body>

    <div class="nailong-bg-animation">
        <div class="nailong-character nailong-1"></div>
        <div class="nailong-character nailong-2"></div>
        <div class="nailong-character nailong-3"></div>
        <div class="nailong-character nailong-4"></div>
    </div>

    <header>
        <h1>WINYUK API</h1>
        <p class="subtitle">🐉 NAILONG_POWERED / MEDIA_EXTRACTOR 🐉</p>
    </header>

    <div class="wrapper">
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" data-target="tiktok" onclick="switchTab('tiktok')"><span>TikTok</span></button>
                <button class="tab-btn" data-target="discord" onclick="switchTab('discord')"><span>Discord</span></button>
                <button class="tab-btn" data-target="facebook" onclick="switchTab('facebook')"><span>Facebook</span></button>
            </div>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Tempel URL TikTok di sini, ya! 🐉" autocomplete="off">
            </div>

            <button class="btn-process" id="processBtn" onclick="processDownload()">
                <span id="btnText">Ekstrak Media!</span>
                <div class="loader-wrapper" id="loaderWrapper">
                    <div class="nailong-loader">🐉</div>
                    <div class="loading-text">Nailong sedang bekerja...</div>
                </div>
            </button>

            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <script>
        let currentMode = 'tiktok';

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-target="${mode}"]`).classList.add('active');
            
            const input = document.getElementById('urlInput');
            if (mode === 'tiktok') input.placeholder = 'Tempel URL TikTok di sini, ya! 🐉';
            else if (mode === 'discord') input.placeholder = 'Tempel URL Lampiran Discord-nya! 🐉';
            else if (mode === 'facebook') input.placeholder = 'Mana URL Video Facebook-nya? 🐉';
            
            input.value = '';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('resultBox').innerHTML = '';
        }

        async function processDownload() {
            const urlInput = document.getElementById('urlInput').value;
            const btnText = document.getElementById('btnText');
            const loaderWrapper = document.getElementById('loaderWrapper');
            const resultBox = document.getElementById('resultBox');

            if (!urlInput) {
                alert('Tautannya jangan lupa diisi, ya! 🐉');
                return;
            }

            // Animasi loading ala Nailong
            btnText.style.display = 'none';
            loaderWrapper.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch(`/api/${currentMode}?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                resultBox.style.display = 'block';
                
                if (data.success) {
                    let mediaHTML = '';
                    
                    if (data.type === 'image' || data.type === 'video') {
                        mediaHTML = `<div class="media-grid">`;
                        data.media.forEach((link, index) => {
                            const animDelay = index * 0.1; 
                            mediaHTML += `
                                <div class="media-item" style="animation-delay: ${animDelay}s">
                                    ${data.type === 'image' 
                                        ? `<img src="${link}" alt="Nailong Extracted Media">` 
                                        : `<video src="${link}" controls></video>`}
                                    <a href="${link}" target="_blank" class="btn-download">Unduh!</a>
                                </div>
                            `;
                        });
                        mediaHTML += `</div>`;
                    } 
                    else if (data.type === 'file') {
                        mediaHTML = `
                            <div class="media-item" style="margin-top: 1rem; padding: 2rem;">
                                <a href="${data.media[0]}" target="_blank" class="btn-download" style="padding: 1rem; font-size: 1.1rem;">[ BUKA FILE ]</a>
                            </div>
                        `;
                    }

                    resultBox.innerHTML = `
                        <div style="border-bottom: 2px solid var(--card-border); padding-bottom: 1rem; margin-bottom: 1rem;">
                            <h3 style="color: var(--secondary); font-family: 'Fredoka One', cursive; margin-bottom: 8px;">BERHASIL! 🐉</h3>
                            ${data.author ? `<p style="color: var(--text-muted); font-size: 0.95rem;"><strong>User:</strong> @${data.author}</p>` : ''}
                            ${data.title ? `<p style="color: var(--text-main); font-size: 0.85rem; margin-top: 5px; line-height: 1.5; font-weight:800;">${data.title}</p>` : ''}
                        </div>
                        ${mediaHTML}
                    `;
                } else {
                    resultBox.innerHTML = `
                        <p style="color: #ff0050; font-family: 'Sniglet', cursive; font-weight: 800;">
                            > OOPS! Nailong Gagal: ${data.message}
                        </p>`;
                }
            } catch (error) {
                resultBox.style.display = 'block';
                resultBox.innerHTML = `
                    <p style="color: #ff0050; font-family: 'Sniglet', cursive; font-weight: 800;">
                        > WAH! Koneksi Putus: Tidak bisa hubungi Vercel API.
                    </p>`;
            } finally {
                // Matikan loading
                btnText.style.display = 'block';
                loaderWrapper.style.display = 'none';
            }
        }
    </script>
</body>
</html>
