<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINYUK API | Premium Developer Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['Fira Code', 'monospace'] },
                    colors: { darkBg: '#0a0a0a', glass: 'rgba(255, 255, 255, 0.05)', glassBorder: 'rgba(255, 255, 255, 0.1)' }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-white antialiased overflow-x-hidden selection:bg-purple-500 selection:text-white">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30 animate-blob pointer-events-none"></div>
    <div class="fixed top-[20%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30 animate-blob animation-delay-2000 pointer-events-none"></div>

    <nav class="fixed w-full z-50 backdrop-blur-md bg-glass border-b border-glassBorder transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-blue-400">
                WINYUK<span class="text-white">API</span>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="#dashboard" class="hover:text-purple-400 transition-colors">Dashboard</a>
                <a href="#endpoints" class="hover:text-purple-400 transition-colors">Live Tester</a>
            </div>
            <button id="navLoginBtn" class="px-6 py-2 rounded-full bg-white text-black font-semibold hover:bg-gray-200 transition-all transform hover:scale-105 shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                Login <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
            </button>
        </div>
    </nav>

    <div id="authModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md hidden flex justify-center items-center opacity-0 transition-opacity duration-300">
        <div id="authBox" class="bg-[#0f0f13] border border-gray-800 p-8 rounded-[2rem] w-full max-w-md transform scale-95 transition-all duration-300 shadow-[0_0_40px_rgba(168,85,247,0.15)] relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-600 rounded-full blur-[60px] opacity-20"></div>
            
            <div class="flex justify-between items-center mb-8 relative z-10">
                <div>
                    <h3 id="authTitle" class="text-3xl font-extrabold text-white tracking-wide">Sign In</h3>
                    <p id="authSubtitle" class="text-gray-400 text-sm mt-1">Masuk ke developer portal.</p>
                </div>
                <button id="closeModalBtn" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <form id="authForm" class="space-y-5 relative z-10" onsubmit="return false;">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="usernameInput" autocomplete="off" placeholder="winyuk_dev" required
                            class="w-full bg-black/50 border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                        <input type="password" id="passwordInput" placeholder="••••••••" required
                            class="w-full bg-black/50 border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition-all">
                    </div>
                </div>

                <button id="submitAuthBtn" type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 rounded-xl hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] transition-all transform hover:-translate-y-1 mt-4">
                    Login Now
                </button>
            </form>
            
            <div class="text-center mt-6 relative z-10">
                <p class="text-gray-400 text-sm">
                    <span id="switchText">New here?</span> 
                    <button id="switchModeBtn" class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 font-bold hover:opacity-80 transition-opacity ml-1 border-b border-purple-400">
                        Create an account
                    </button>
                </p>
            </div>
        </div>
    </div>
    <section id="dashboard" class="pt-32 pb-10 px-6 flex flex-col justify-center items-center relative z-10">
        <div class="text-center max-w-3xl mx-auto mb-12 fade-in-up">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                Empower Your Bot with <br>
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-purple-500 via-blue-500 to-cyan-400 animate-gradient">Premium API</span>
            </h1>
            <p id="welcomeText" class="text-lg text-gray-400 mb-8">Portal developer mewah untuk mengelola integrasi bot Anda.</p>
        </div>

        <div class="w-full max-w-2xl bg-glass backdrop-blur-xl border border-glassBorder rounded-3xl p-8 shadow-2xl relative overflow-hidden fade-in-up delay-100 group">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-blue-500"></div>
            
            <div id="lockedOverlay" class="absolute inset-0 z-20 bg-[#0a0a0a]/85 backdrop-blur-md flex flex-col justify-center items-center transition-all duration-500">
                <div class="w-20 h-20 bg-purple-500/20 rounded-full flex items-center justify-center mb-4">
                    <i class="fa-solid fa-lock text-3xl text-purple-400"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Akses Terkunci</h3>
                <p class="text-gray-400 text-sm mb-6 text-center px-4">Silakan login untuk mendapatkan dan mengelola API Key Anda.</p>
                <button id="overlayLoginBtn" class="px-8 py-3 bg-white text-black rounded-full font-bold hover:bg-gray-200 transition-colors shadow-lg">Login Sekarang</button>
            </div>

            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-key text-purple-400"></i> Your Secret API Key
            </h2>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <input type="password" id="apiKeyDisplay" readonly value="********************************" 
                           class="w-full bg-black/60 border border-gray-700 rounded-xl py-4 px-5 text-gray-300 font-mono text-sm focus:outline-none focus:border-purple-500 transition-colors">
                    <button id="toggleVisibilityBtn" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <button id="regenerateKeyBtn" class="bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white px-6 py-4 rounded-xl font-semibold shadow-lg transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button id="copyKeyBtn" class="bg-white/10 hover:bg-white/20 border border-glassBorder text-white px-6 py-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2" title="Copy Key">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
