<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WINYUK API</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { darkBg: '#0a0a0a' }
                }
            }
        }
    </script>
    <style>
        /* Desain Pop-up Notifikasi agar elegan */
        body { background-color: #0a0a0a; color: white; }
        .glass-panel { background: rgba(15, 15, 19, 0.8); backdrop-filter: blur(16px); border: 1px solid #1f2937; }
        div:where(.swal2-container) { z-index: 9999 !important; }
        .swal2-popup { background: #1a1a1a !important; color: white !important; border: 1px solid #374151 !important; border-radius: 1rem !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-96 h-96 bg-purple-900 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-900 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>

    <div class="glass-panel p-8 rounded-[2rem] w-full max-w-md shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-2">WINYUK API</h1>
            <h2 class="text-xl font-bold">Welcome Back</h2>
            <p class="text-gray-400 text-sm">Silakan login untuk masuk ke sistem.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="usernameInput" placeholder="Masukkan username..." required 
                        class="w-full bg-black border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:outline-none transition-colors">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••" required 
                        class="w-full bg-black border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:outline-none transition-colors">
                </div>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition-all mt-4">
                Login
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-gray-400 text-sm">
                Belum punya akun? 
                <a href="register.html" class="text-purple-400 font-bold hover:text-purple-300">Daftar di sini</a>
            </p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
