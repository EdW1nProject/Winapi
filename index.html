<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINYUK | Premium Media Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --tiktok: #ff0050;
            --discord: #5865F2;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        header { text-align: center; padding: 4rem 2rem 2rem; animation: fadeInDown 1s ease-out; }
        
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active[data-target="tiktok"] { background: var(--tiktok); color: white; box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4); }
        .tab-btn.active[data-target="discord"] { background: var(--discord); color: white; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); }

        .input-group { position: relative; margin-bottom: 1.5rem; }
        
        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }

        .btn-process {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-process:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(129, 140, 248, 0.4); }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--card-border);
            display: none;
            word-break: break-all;
        }

        /* Loading Animation */
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-bottom-color: white;
            border-radius: 50%;
            margin: 0 auto;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>WINYUK API</h1>
        <p style="color: var(--text-muted);">Premium Media Downloader</p>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-target="tiktok" onclick="switchTab('tiktok')">TikTok</button>
            <button class="tab-btn" data-target="discord" onclick="switchTab('discord')">Discord</button>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Tempel URL TikTok di sini..." autocomplete="off">
        </div>

        <button class="btn-process" id="processBtn" onclick="processDownload()">
            <span id="btnText">Proses Tautan</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        let currentMode = 'tiktok';

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-target="${mode}"]`).classList.add('active');
            
            const input = document.getElementById('urlInput');
            input.placeholder = mode === 'tiktok' ? 'Tempel URL TikTok di sini...' : 'Tempel URL lampiran Discord di sini...';
            input.value = '';
            document.getElementById('resultBox').style.display = 'none';
        }

        async function processDownload() {
            const urlInput = document.getElementById('urlInput').value;
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');

            if (!urlInput) return alert('Silakan masukkan URL terlebih dahulu!');

            // UI Loading State
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                // Memanggil API Vercel Serverless kita sendiri
                const response = await fetch(`/api/${currentMode}?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                resultBox.style.display = 'block';
                if (data.success) {
                    resultBox.innerHTML = `
                        <h3 style="color: #4ade80; margin-bottom: 10px;">Berhasil!</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">Data berhasil diekstrak.</p>
                        <a href="${data.download_url}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: bold;">[Klik di sini untuk mengunduh / melihat data]</a>
                    `;
                } else {
                    resultBox.innerHTML = `<p style="color: #ef4444;">Error: ${data.message}</p>`;
                }
            } catch (error) {
                resultBox.style.display = 'block';
                resultBox.innerHTML = `<p style="color: #ef4444;">Gagal terhubung ke API.</p>`;
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
