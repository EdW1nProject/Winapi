<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WINYUK API</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { darkBg: '#0a0a0a' }
                }
            }
        }
    </script>
    <style>
        /* Efek pop-up SweetAlert agar sesuai tema gelap */
        div:where(.swal2-container) { z-index: 9999 !important; }
        .swal2-popup { border: 1px solid rgba(255, 255, 255, 0.1) !important; box-shadow: 0 0 40px rgba(168, 85, 247, 0.15) !important; border-radius: 1.5rem !important; }
    </style>
</head>
<body class="bg-darkBg text-white antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>

    <div class="bg-[#0f0f13]/80 backdrop-blur-xl border border-gray-800 p-8 rounded-[2rem] w-full max-w-md shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-2">WINYUK API</h1>
            <h2 id="formTitle" class="text-xl font-bold text-white">Welcome Back</h2>
            <p id="formSubtitle" class="text-gray-400 text-sm">Masuk untuk mengelola bot Anda.</p>
        </div>

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="usernameInput" placeholder="Masukkan username..." required minlength="3"
                        class="w-full bg-black/50 border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:outline-none transition-colors">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••" required minlength="4"
                        class="w-full bg-black/50 border border-gray-700 rounded-xl pl-12 pr-4 py-3.5 text-white focus:border-purple-500 focus:outline-none transition-colors">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 rounded-xl hover:opacity-90 transition-all transform hover:-translate-y-1 mt-4 shadow-lg shadow-purple-500/30">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-gray-400 text-sm">
                <span id="switchText">Belum punya akun?</span> 
                <button type="button" id="switchModeBtn" class="text-purple-400 font-bold hover:text-purple-300 transition-colors ml-1">Daftar di sini</button>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
